# Unsigned production bundles for local dogfooding (all platforms).
# Trigger: GitHub → Actions → Dogfood Build → Run workflow.
# Artifacts: one zip per OS under the workflow run (no GitHub Release created).

name: Dogfood Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Release bundle (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows
            build_command: npm run release:build
            artifact_glob: src-tauri/target/release/bundle/**/*
          - platform: ubuntu-22.04
            label: linux
            build_command: npm run check:versions && npm run build && npm run tauri -- build --bundles deb
            artifact_glob: src-tauri/target/release/bundle/**/*
          - platform: macos-latest
            label: macos
            build_command: npm run release:build
            artifact_glob: src-tauri/target/release/bundle/**/*

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: bash scripts/ci/install-linux-tauri-deps.sh

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release bundles
        run: ${{ matrix.build_command }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: mach-terminal-${{ matrix.label }}-dogfood
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
