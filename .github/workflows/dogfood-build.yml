# Unsigned production bundles for local dogfooding (all platforms).
# Trigger: GitHub → Actions → Dogfood Build → Run workflow.
# Artifacts: one zip per OS under the workflow run (no GitHub Release created).

name: Dogfood Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Release bundle (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows
            artifact_glob: src-tauri/target/release/bundle/**/*
          - platform: ubuntu-latest
            label: linux
            artifact_glob: src-tauri/target/release/bundle/**/*
          - platform: macos-latest
            label: macos
            artifact_glob: src-tauri/target/release/bundle/**/*

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate version consistency
        run: npm run check:versions

      - name: Build release bundles
        run: npm run release:build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: mach-terminal-${{ matrix.label }}-v0.1.0
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
