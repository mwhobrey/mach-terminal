name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"

permissions:
  contents: write

jobs:
  validate-stable-signing:
    name: Validate stable signing secrets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc.')
    steps:
      - name: Require signing secrets for stable tags
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_PUBLIC_KEY: ${{ secrets.UPDATER_PUBLIC_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Stable releases require TAURI_SIGNING_PRIVATE_KEY in repository secrets."
            exit 1
          fi
          if [ -z "$UPDATER_PUBLIC_KEY" ]; then
            echo "::error::Stable releases require UPDATER_PUBLIC_KEY in repository secrets."
            exit 1
          fi
          echo "Stable signing secrets present."

  preflight-release-quality:
    name: Release Preflight Quality Gates
    runs-on: ubuntu-latest
    needs: validate-stable-signing
    if: always() && (needs.validate-stable-signing.result == 'success' || needs.validate-stable-signing.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Validate version consistency
        run: npm run check:versions

      - name: Run full test suite
        run: npm run test

      - name: Run stability signoff
        run: npm run stability:signoff

      - name: Run release smoke
        run: npm run release:smoke

      - name: Run security baseline checks
        run: npm run security:baseline

  build-and-release:
    needs: [validate-stable-signing, preflight-release-quality]
    if: always() && (needs.validate-stable-signing.result == 'success' || needs.validate-stable-signing.result == 'skipped') && needs.preflight-release-quality.result == 'success'
    name: Build and Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate version consistency
        run: npm run check:versions

      - name: Generate release notes from changelog
        id: release_notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/extract-changelog.mjs "$VERSION" > RELEASE_NOTES.md
          {
            echo "notes<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Enable updater plugin for release packages
        env:
          MACH_UPDATER_ENDPOINT: https://github.com/MachBox-Dev/mach-terminal/releases/latest/download/latest.json
          UPDATER_PUBLIC_KEY: ${{ secrets.UPDATER_PUBLIC_KEY }}
        run: node scripts/enable-updater-build.mjs

      - name: Require macOS signing identity secret
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::error::Set APPLE_SIGNING_IDENTITY to the full codesign identity (run: security find-identity -v -p codesigning on a Mac with the .p12 imported)."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY is set (length ${#APPLE_SIGNING_IDENTITY})."

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Tier 2 macOS — match Mach Triage release.yml (empty p12 password when export has none)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ""
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          VITE_ENABLE_UPDATER: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mach Terminal ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          # Stable tags: draft first; promote via .github/workflows/promote-release.yml
          releaseDraft: ${{ !contains(github.ref_name, '-rc.') }}
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          args: ${{ matrix.args }}

  publish-checksums:
    name: Publish Release Checksums
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" --dir release-assets

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Upload checksum file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" release-assets/SHA256SUMS.txt --clobber
