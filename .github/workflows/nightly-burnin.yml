name: Nightly Burn-In

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  nightly-burnin:
    name: Nightly Burn-In (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: bash scripts/ci/install-linux-tauri-deps.sh

      - name: Install npm dependencies
        run: npm ci

      - name: Run nightly burn-in scenarios
        env:
          BURNIN_ARTIFACT_DIR: artifacts/burnin
        run: npm run burnin:nightly

      - name: Evaluate threshold gates
        env:
          BURNIN_ARTIFACT_DIR: artifacts/burnin
          BURNIN_MAX_P95_MS: ${{ runner.os == 'Windows' && '360000' || '200000' }}
          BURNIN_MAX_TEST_MS: ${{ runner.os == 'Windows' && '540000' || '300000' }}
        run: npm run burnin:gate

      - name: Upload burn-in artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: burnin-${{ matrix.os }}
          path: artifacts/burnin
